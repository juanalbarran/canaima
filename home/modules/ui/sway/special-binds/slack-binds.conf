# home/modules/ui/sway/special-binds/slack-binds.conf

# Set the Slack executable path (adjust if using a specific Nix profile path)
set $slack slack

# Set the app_id for Slack
set $slack_id Slack

# Focus Slack if it's open, otherwise launch it
bindsym $mod+s exec swaymsg '[app_id="$slack_id"] focus' || exec $slack
